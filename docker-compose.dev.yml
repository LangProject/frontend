name: lang-frontend

services:
  next-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    container_name: lang-frontend-dev
    volumes:
      - .:/app                      # Mounts your local directory into /app in the container
      - /app/node_modules           # Prevents node_modules on host from overwriting container's node_modules
      - /app/.next                  # Prevents .next build cache from being overwritten
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true      # Enables live reloading on Windows
      - CHOKIDAR_USEPOLLING=true    # Alternative polling for file changes
      - NEXT_TELEMETRY_DISABLED=1
    stdin_open: true
    tty: true
    restart: unless-stopped
