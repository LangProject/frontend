name: lang-frontend

services:
  react-app:
    build:
      context: ./react-app
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    container_name: react-app
    volumes:
      - ./react-app:/app                      # Mounts your local directory into /app in the container (enable live reloading, hotfix reloading, etc.)
      - /app/node_modules                     # Prevents node_modules on host from overwriting container's node_modules
    environment:
      WATCHPACK_POLLING: "true"               # Enables live reloading; Watchpack will poll the filesystem for changes continuously
